# Nginx reverse proxy config for CookNextDoor API
# Deploy to: /etc/nginx/sites-available/api.cooknextdoor.org
# Then: sudo ln -s /etc/nginx/sites-available/api.cooknextdoor.org /etc/nginx/sites-enabled/
# Then: sudo certbot --nginx -d api.cooknextdoor.org

server {
    listen 80;
    server_name api.cooknextdoor.org;

    location / {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90s;
    }
}
